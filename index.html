/* ================= donde inicia ================= */
let tramoActual="L6Y";
let actual=null;
let kmManual = false;




/* ================= FUNCIONES ================= */
function horaSistema(){
    const d = new Date();
    return d.toTimeString().slice(0,5);
}

/* Selector de tramos */
function inicializarTramos(){
    const selector = document.getElementById("selectorTramo");
    selector.innerHTML = "";
    for(const key in TRAMOS){
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = TRAMOS[key].nombre;
        selector.appendChild(opt);
    }
    selector.value = tramoActual;
}

function cambiarTramo(){
    const selector = document.getElementById("selectorTramo");
    tramoActual = selector.value;

    kmManual = false; // 👈 clave

    sentido.value = "up";
    cambiarSentido();
}
window.cambiarTramo = cambiarTramo;

function prohibicionesTramo(){
    const t = TRAMOS[tramoActual];
    if(!t.zonasFijas) return [];

    return t.zonasFijas.filter(z =>
        z.tipo === "prohibicion_cruce"
    );
}


function mostrarAlertaTramo(){
    const cont = document.getElementById("alertaTramo");
    let zonas = prohibicionesTramo();

    if(!zonas.length){
        cont.innerHTML = "";
        return;
    }

    // ordenar según sentido de navegación
    zonas = [...zonas].sort((a,b) => {
        return sentido.value === "up"
            ? a.desde - b.desde
            : b.desde - a.desde;
    });

    cont.innerHTML = `
    <div style="
        background:#fff3cd;
        color:#333;
        padding:8px 10px;
        border-left:6px solid #c62828;
        border-radius:5px;
        margin-top:8px;
        font-size:12px;
        line-height:1.4;
    ">
        ⛔ <b>Prohibiciones de cruce en el tramo</b><br>
        ${
            zonas.map(z => {
                const d1 = sentido.value === "up" ? z.desde : z.hasta;
                const d2 = sentido.value === "up" ? z.hasta : z.desde;
                return `• KM ${d1} a ${d2} – ${z.texto}`;
            }).join("<br>")
        }
    </div>
    `;
}






/* Cambiar sentido */
function cambiarSentido(){
    const t = TRAMOS[tramoActual];

    if(!kmManual){
        kmActual.value = sentido.value === "up" ? t.inicio : t.fin;
    }

    if(!horaInicio.value){
        horaInicio.value = horaSistema();
    }

    render();
    recalcular();
    mostrarAlertaTramo();
}

window.cambiarSentido = cambiarSentido;


/* Render lista boyas/peligros */

function kmEnProhibicion(km){
    const zonas = prohibicionesTramo();
    return zonas.some(z =>
        km >= z.desde && km <= z.hasta
    );
}
function render(){
    const t=TRAMOS[tramoActual];
    tituloTramo.textContent=t.nombre;
    lista.innerHTML="";
    let arr=[...t.data];
    if(sentido.value==="down") arr.reverse();

    arr.forEach(e=>{
        const d = document.createElement("div");
d.className = "km "+(e.clase||"");

if(kmEnProhibicion(e.km)){
    d.classList.add("prohibicion");
}

        d.innerHTML=`<b>KM ${e.km}</b>`;
        if(e.txt) d.innerHTML+=`<div class="obs">${e.txt}</div>`;
        if(e.obs) d.innerHTML+=`<div class="obs">${e.obs}</div>`;
        d.onclick=()=>seleccionar(e,d);
        lista.appendChild(d);
        const crucesKm = zonasCruceActivas(e.km);

if(crucesKm.length){
    d.style.background = "#fdecea";
    d.style.borderLeftColor = "#c62828";
}
if(e.tipo === "boya_preferencial"){
    if(e.preferencia === "canal_principal_derecha"){
        d.classList.add("preferencial-derecha");
        d.innerHTML += `<div class="obs">↘ Canal principal a estribor</div>`;
    }
    if(e.preferencia === "canal_principal_izquierda"){
        d.classList.add("preferencial-izquierda");
        d.innerHTML += `<div class="obs">↙ Canal principal a babor</div>`;
    }
}
if(e.tipo === "puente"){
    d.innerHTML += `<div class="obs">🌉 Puente</div>`;
}
    });
}

/* Seleccionar KM */


function seleccionar(e,div){
    document.querySelectorAll(".km").forEach(x=>{
        x.classList.remove("selected");
        x.querySelector(".menu")?.remove();
    });
    actual=e;
    div.classList.add("selected");
    kmManual = false;
    kmActual.value=e.km;
    if(!horaInicio.value) horaInicio.value=horaSistema();

    const crucesKm = zonasCruceActivas(e.km);

if(crucesKm.length){
    const aviso = document.createElement("div");
    aviso.className = "obs";
    aviso.innerHTML = crucesKm
        .map(z => `⛔ ${z.texto} (${z.desde}–${z.hasta})`)
        .join("<br>");
    div.appendChild(aviso);
}


    const m=document.createElement("div");
    m.className="menu";
    m.innerHTML=`
        <button onclick="verCarta()">🗺 Carta</button>
        <button onclick="verObs()">📝 Obs</button>
    `;
    div.appendChild(m);
    recalcular();
}

/* Recalcular ETA */

function zonasCruceActivas(km){
    const t = TRAMOS[tramoActual];
    if(!t.zonasFijas) return [];

    return t.zonasFijas.filter(z =>
        z.tipo === "prohibicion_cruce" &&
        km >= z.desde &&
        km <= z.hasta &&
        (z.sentido === "ambos" || z.sentido === sentido.value)
    );
}



function recalcular(){
    if(!horaInicio.value) return;

    const km = +kmActual.value;
    const vel = +velocidad.value;
    if(!vel) return;

    const destinoManualInput = document.getElementById("kmDestinoManual");
    const destinoManual = destinoManualInput.value ? +destinoManualInput.value : null;

    const [h,m] = horaInicio.value.split(":").map(Number);
    const inicio = h*60 + m;
    const t = TRAMOS[tramoActual];
    let out = "<b>ETA:</b><br>";

    const cruces = zonasCruceActivas(km);

cruces.forEach(z => {
    out += `
    <div style="
        background:#c62828;
        color:white;
        padding:6px;
        border-radius:4px;
        margin-bottom:6px;
        font-weight:bold;
    ">
        ⛔ PROHIBIDO CRUCE<br>
        ${z.texto}<br>
        KM ${z.desde} → KM ${z.hasta}
    </div>
    `;
});

    window.recalcular = recalcular;

    // Destinos predefinidos
    t.destinos.forEach(d => {
        const minutosViaje = Math.abs(d - km) / vel * 60;
const tt = inicio + minutosViaje;

const hh = Math.floor(tt / 60) % 24;
const mm = Math.floor(tt % 60);

out += `KM ${d}: ${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}
        <span style="color:#555"> (+ ${formatearDuracion(minutosViaje)})</span><br>`;

    });

    // Destino manual
    if(destinoManual !== null && !isNaN(destinoManual)){
        const minutosViaje = Math.abs(destinoManual - km) / vel * 60;
const tt = inicio + minutosViaje;

const hh = Math.floor(tt / 60) % 24;
const mm = Math.floor(tt % 60);

out += `<hr><b>KM ${destinoManual}:</b> ${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}
        <span style="color:#555"> (+ ${formatearDuracion(minutosViaje)})</span>`;

    }

    resultado.innerHTML = out;
}

function formatearDuracion(minutos){
    const h = Math.floor(minutos / 60);
    const m = Math.round(minutos % 60);
    return `${h} h ${m} min`;
}


/* ================= OBSERVACIONES ================= */

let unsubscribeObs = null;

function escucharObservaciones(){
    if(unsubscribeObs) unsubscribeObs();

    const ref = collection(
        db,
        "observaciones",
        tramoActual,
        String(actual.km)
    );

    const q = query(ref, orderBy("fecha", "desc"));

    unsubscribeObs = onSnapshot(q, snap => {
        const historial = document.getElementById("historial");
historial.innerHTML = "";

        snap.forEach(docu => {
            const o = docu.data();
            const div = document.createElement("div");
            div.className = "historico";

            div.innerHTML = `
                <div class="fecha">${o.fecha.toDate().toLocaleString()}</div>
                <div>${o.texto}</div>
                ${esAdmin ? `
                    <button onclick="editarObs('${docu.id}')">✏️</button>
                    <button onclick="borrarObs('${docu.id}')">🗑</button>
                ` : ""}
            `;

            historial.appendChild(div);
        });
    });
}

window.verObs = function(){
    document.getElementById("kmObs").textContent = actual.km;
    document.getElementById("modalObs").style.display = "flex";
    escucharObservaciones();
}





window.guardarObs = async function(){
    const textarea = document.getElementById("textoObs");
    const texto = textarea.value.trim();

    if(texto.length < 5){
        alert("La observación debe tener al menos 5 caracteres.");
        return;
    }

    const ref = collection(
        db,
        "observaciones",
        tramoActual,
        String(actual.km)
    );

    await addDoc(ref, {
        texto: texto,
        fecha: new Date(),
        admin: esAdmin
    });

    textarea.value = "";
}


window.editarObs = async function(id){
    if(!esAdmin) return;

    const nuevo = prompt("Editar observación:");
    if(!nuevo || nuevo.trim().length < 5) return;

    const ref = doc(
        db,
        "observaciones",
        tramoActual,
        String(actual.km),
        id
    );

    await updateDoc(ref, { texto: nuevo.trim() });
}


window.borrarObs = async function(id){
    if(!confirm("¿Borrar observación?")) return;

    const ref = doc(
        db,
        "observaciones",
        tramoActual,
        String(actual.km),
        id
    );

    await deleteDoc(ref);
}
